name: Check PUA page

on:
  schedule:
    # Cada 5 minuts entre les 6:00 i les 18:59 UTC (equivalent a 8:00–20:59 CEST)
    - cron: "*/5 6-18 * * *"
    # Cada 30 minuts entre les 19:00 i les 5:59 UTC (equivalent a 21:00–07:59 CEST)
    - cron: "*/30 19-23,0-5 * * *"
  workflow_dispatch:  # permet executar manualment

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Andorra   # Força la zona horària a CEST

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml pytz

      - name: Run script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python3 check.py